version: "3.9"

services:
  websocket:
    build: ./ws-server
    container_name: ws-server
    ports:
      - "8000:8000"

  nginx:
    image: nginx:1.24.0
    container_name: nginx-server
    ports:
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - websocket